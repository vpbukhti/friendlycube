<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>friendlycube</title>
<style>
  :root{
    --bg:#1a1a1c; --panel:#242427; --line:#34343a; --txt:#e8e4da; --mut:#9a968c;
    --accent:#eae3d4; --accent2:#85b7eb;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--txt);overflow:hidden;
    font:13px/1.4 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}
  header{height:52px;border-bottom:1px solid var(--line);display:flex;gap:10px;
    align-items:center;padding:0 16px}
  header h1{font-size:14px;margin:0;letter-spacing:.5px;font-weight:600;color:var(--accent)}
  header .badge{font-size:11px;color:var(--mut)} header .badge b{color:var(--txt)}
  #building{color:var(--accent2);display:none} #building.on{display:inline}
  header .sp{flex:1}
  button{background:var(--panel);color:var(--txt);border:1px solid var(--line);
    border-radius:7px;padding:7px 11px;font:inherit;cursor:pointer}
  button:hover{border-color:var(--accent2)}
  button.primary{background:var(--accent);color:#1a1a1c;border-color:var(--accent);font-weight:600}
  #stage{display:flex;height:calc(100% - 52px)}
  #view{flex:1;position:relative;min-width:0}
  #gl{width:100%;height:100%;display:block;cursor:grab}
  #gl:active{cursor:grabbing}
  #hint{position:absolute;left:12px;bottom:10px;color:var(--mut);font-size:11px;
    pointer-events:none;opacity:.7}
  #panel{width:344px;flex:none;border-left:1px solid var(--line);overflow-y:auto;
    padding:12px 14px 40px;background:#202023}
  .group h2{font-size:11px;text-transform:uppercase;letter-spacing:.9px;
    color:var(--mut);margin:16px 0 8px}
  .row{display:grid;grid-template-columns:120px 1fr 66px;gap:8px;align-items:center;padding:3px 0}
  .row label{color:var(--mut);font-size:12px}
  .row .note{color:#6f6b62;font-size:10px}
  .row.wide{grid-template-columns:120px 1fr}
  input[type=range]{width:100%;accent-color:var(--accent2)}
  input[type=number],input[type=text],select{background:var(--bg);color:var(--txt);
    border:1px solid var(--line);border-radius:6px;padding:4px 5px;width:100%;font:inherit}
  input[type=checkbox]{width:17px;height:17px;accent-color:var(--accent2)}
  .toast{position:fixed;bottom:16px;left:calc(50% - 172px);transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--accent2);border-radius:8px;
    padding:9px 14px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.on{opacity:1}
</style>
</head>
<body>
<header>
  <h1>friendlycube</h1>
  <span class="badge">seed <b id="seed">—</b></span>
  <span class="badge">tris <b id="tris">0</b></span>
  <span id="building" class="badge">● rendering…</span>
  <span class="sp"></span>
  <button id="regen">Regenerate</button>
  <button id="save">Save</button>
  <button id="load">Load</button>
  <button id="export" class="primary">Export STL</button>
</header>
<div id="stage">
  <div id="view">
    <canvas id="gl"></canvas>
    <div id="hint">drag to orbit · scroll to zoom</div>
  </div>
  <div id="panel"></div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const $ = s => document.querySelector(s);
const jget = async u => (await fetch(u)).json();
const jpost = async (u,b) => (await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})})).json();
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('on'),2200);}

/* ---------------- control panel ---------------- */
let cfg={}, schema=[], spin=true;
let postTimer=null;
function schedulePost(){clearTimeout(postTimer);postTimer=setTimeout(()=>jpost('/api/config',cfg),350);}

function makeRow(p){
  const row=document.createElement('div'); row.className='row';
  const lab=document.createElement('label'); lab.textContent=p.label;
  if(p.note){const n=document.createElement('span');n.className='note';n.textContent=' '+p.note;lab.appendChild(n);}
  row.appendChild(lab);
  if(p.kind==='bool'){
    row.classList.add('wide');
    const cb=document.createElement('input');cb.type='checkbox';cb.checked=!!cfg[p.key];
    cb.onchange=()=>{cfg[p.key]=cb.checked;
      if(p.key==='autoSpin'){spin=cb.checked;jpost('/api/spin',{on:cb.checked});}else schedulePost();};
    row.appendChild(cb);return row;
  }
  if(p.kind==='enum'){
    row.classList.add('wide');
    const sel=document.createElement('select');
    for(const o of p.enum){const opt=document.createElement('option');opt.value=o;opt.textContent=o;sel.appendChild(opt);}
    sel.value=cfg[p.key]; sel.onchange=()=>{cfg[p.key]=sel.value;schedulePost();};
    row.appendChild(sel);return row;
  }
  if(p.kind==='text'){
    row.classList.add('wide');
    const inp=document.createElement('input');inp.type='text';inp.value=cfg[p.key]??'';inp.id='f_'+p.key;
    inp.onchange=()=>{cfg[p.key]=inp.value;schedulePost();};
    row.appendChild(inp);return row;
  }
  const isInt=p.kind==='int';
  const rng=document.createElement('input');rng.type='range';
  rng.min=p.min;rng.max=p.max;rng.step=p.step||(isInt?1:0.01);rng.value=cfg[p.key];
  const num=document.createElement('input');num.type='number';
  num.min=p.min;num.max=p.max;num.step=rng.step;num.value=cfg[p.key];
  const commit=v=>{let n=isInt?parseInt(v,10):parseFloat(v);if(isNaN(n))return;
    cfg[p.key]=n;rng.value=n;num.value=n;schedulePost();};
  rng.oninput=()=>commit(rng.value); num.onchange=()=>commit(num.value);
  row.appendChild(rng);row.appendChild(num);return row;
}
function renderPanel(){
  const panel=$('#panel');panel.innerHTML='';
  for(const g of schema){
    const box=document.createElement('div');box.className='group';
    const h=document.createElement('h2');h.textContent=g.title;box.appendChild(h);
    for(const p of g.params)box.appendChild(makeRow(p));
    panel.appendChild(box);
  }
}
$('#regen').onclick=async()=>{const r=await jpost('/api/regen');cfg.seed=r.seed;
  const f=$('#f_seed');if(f)f.value=r.seed;toast('regenerated · '+r.seed);};
$('#export').onclick=async()=>{toast('exporting @ '+cfg.exportResolution+'…');
  const r=await jpost('/api/export',{resolution:cfg.exportResolution});
  toast(r.path?('exported '+r.path):'export failed');};
$('#save').onclick=async()=>{const p=prompt('Save config to:','config.json');if(p===null)return;
  const r=await jpost('/api/save',{path:p});toast('saved '+r.path);};
$('#load').onclick=async()=>{const p=prompt('Load config from:','config.json');if(p===null)return;
  const r=await jpost('/api/load',{path:p});if(r&&!r.error){cfg=r;spin=!!cfg.autoSpin;renderPanel();toast('loaded '+p);}else toast('load failed');};

/* ---------------- WebGL view ---------------- */
const canvas=$('#gl');
const gl=canvas.getContext('webgl',{antialias:true,depth:true});
const VERT=`
attribute vec3 aPos; attribute vec3 aNormal; attribute vec3 aColor;
uniform mat4 uMVP; uniform mat4 uModel; uniform mat3 uNormalMat;
varying vec3 vNormal; varying vec3 vWorldPos; varying vec3 vColor;
void main(){ vNormal=normalize(uNormalMat*aNormal);
  vWorldPos=(uModel*vec4(aPos,1.0)).xyz; vColor=aColor;
  gl_Position=uMVP*vec4(aPos,1.0); }`;
const FRAG=`
precision mediump float;
varying vec3 vNormal; varying vec3 vWorldPos; varying vec3 vColor;
uniform vec3 uCamPos; uniform vec3 uLightDirs[3]; uniform vec3 uLightCols[3]; uniform vec3 uAmbient;
void main(){
  vec3 N=normalize(vNormal); vec3 V=normalize(uCamPos-vWorldPos);
  vec3 lit=uAmbient*vColor;
  for(int i=0;i<3;i++){
    vec3 L=normalize(-uLightDirs[i]);
    float ndl=max(dot(N,L),0.0);
    float wrap=max(dot(N,L)*0.5+0.5,0.0);
    vec3 diffuse=uLightCols[i]*(0.7*ndl+0.3*wrap)*vColor;
    vec3 H=normalize(L+V);
    float spec=pow(max(dot(N,H),0.0),32.0)*0.15;
    lit+=diffuse+uLightCols[i]*spec;
  }
  gl_FragColor=vec4(pow(lit,vec3(1.0/1.6)),1.0);
}`;
function sh(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(s);return s;}
const prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));
gl.linkProgram(prog);gl.useProgram(prog);
const loc={
  aPos:gl.getAttribLocation(prog,'aPos'), aNormal:gl.getAttribLocation(prog,'aNormal'), aColor:gl.getAttribLocation(prog,'aColor'),
  uMVP:gl.getUniformLocation(prog,'uMVP'), uModel:gl.getUniformLocation(prog,'uModel'),
  uNormalMat:gl.getUniformLocation(prog,'uNormalMat'), uCamPos:gl.getUniformLocation(prog,'uCamPos'),
  uLightDirs:gl.getUniformLocation(prog,'uLightDirs'), uLightCols:gl.getUniformLocation(prog,'uLightCols'),
  uAmbient:gl.getUniformLocation(prog,'uAmbient'),
};
const posBuf=gl.createBuffer(),nrmBuf=gl.createBuffer(),colBuf=gl.createBuffer();
let vertexCount=0, loadedVersion=-1;
gl.enable(gl.DEPTH_TEST);
const bg=[0x1a/255,0x1a/255,0x1c/255];
const lightDirs=new Float32Array([-5,-8,-4, 4,-2,3, 0,4,5]);
const lightCols=new Float32Array([0.9,0.864,0.792, 0.316,0.34,0.3645, 0.3,0.273,0.231]);

// interaction
let rotX=0.3, rotY=0.6, zoom=1, dragging=false, lastX=0, lastY=0;
canvas.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('mouseup',()=>dragging=false);
window.addEventListener('mousemove',e=>{if(!dragging)return;
  rotY+=(e.clientX-lastX)*0.008; rotX+=(e.clientY-lastY)*0.008;
  rotX=Math.max(-1.5,Math.min(1.5,rotX)); lastX=e.clientX; lastY=e.clientY;});
canvas.addEventListener('wheel',e=>{e.preventDefault();
  zoom*=Math.exp(e.deltaY*0.0011); zoom=Math.max(0.35,Math.min(4,zoom));},{passive:false});

// matrices (column-major)
function m4mul(a,b){const o=new Float32Array(16);
  for(let c=0;c<4;c++)for(let r=0;r<4;r++){let s=0;for(let k=0;k<4;k++)s+=a[k*4+r]*b[c*4+k];o[c*4+r]=s;}return o;}
function m4persp(f,asp,n,fa){const t=1/Math.tan(f/2),nf=1/(n-fa);
  return new Float32Array([t/asp,0,0,0, 0,t,0,0, 0,0,(fa+n)*nf,-1, 0,0,2*fa*n*nf,0]);}
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
const cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
const dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const norm=a=>{const l=Math.hypot(a[0],a[1],a[2])||1;return[a[0]/l,a[1]/l,a[2]/l];};
function m4lookAt(e,c,u){const z=norm(sub(e,c)),x=norm(cross(u,z)),y=cross(z,x);
  return new Float32Array([x[0],y[0],z[0],0, x[1],y[1],z[1],0, x[2],y[2],z[2],0, -dot(x,e),-dot(y,e),-dot(z,e),1]);}
function m4rotX(a){const c=Math.cos(a),s=Math.sin(a);return new Float32Array([1,0,0,0,0,c,s,0,0,-s,c,0,0,0,0,1]);}
function m4rotY(a){const c=Math.cos(a),s=Math.sin(a);return new Float32Array([c,0,-s,0,0,1,0,0,s,0,c,0,0,0,0,1]);}
const camBase=[4.2,2.8,5.0];

async function loadMesh(){
  const resp=await fetch('/api/mesh'); const buf=await resp.arrayBuffer();
  if(buf.byteLength<4){vertexCount=0;return;}
  const V=new DataView(buf).getUint32(0,true);
  vertexCount=V;
  if(V>0){
    const f=new Float32Array(buf,4);
    gl.bindBuffer(gl.ARRAY_BUFFER,posBuf); gl.bufferData(gl.ARRAY_BUFFER,f.subarray(0,3*V),gl.DYNAMIC_DRAW);
    gl.bindBuffer(gl.ARRAY_BUFFER,nrmBuf); gl.bufferData(gl.ARRAY_BUFFER,f.subarray(3*V,6*V),gl.DYNAMIC_DRAW);
    gl.bindBuffer(gl.ARRAY_BUFFER,colBuf); gl.bufferData(gl.ARRAY_BUFFER,f.subarray(6*V,9*V),gl.DYNAMIC_DRAW);
  }
  loadedVersion=parseInt(resp.headers.get('X-Mesh-Version')||'0',10);
}
function bindAttr(l,b){gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.enableVertexAttribArray(l);gl.vertexAttribPointer(l,3,gl.FLOAT,false,0,0);}

function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const w=Math.floor(canvas.clientWidth*dpr), h=Math.floor(canvas.clientHeight*dpr);
  if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;}
}
let last=performance.now();
function frame(now){
  const dt=(now-last)/1000; last=now;
  if(spin&&!dragging) rotY+=0.4*dt;
  resize();
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(bg[0],bg[1],bg[2],1); gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  if(vertexCount>0){
    const asp=canvas.width/Math.max(1,canvas.height);
    const proj=m4persp(38*Math.PI/180,asp,0.1,100);
    const eye=[camBase[0]*zoom,camBase[1]*zoom,camBase[2]*zoom];
    const view=m4lookAt(eye,[0,0,0],[0,1,0]);
    const model=m4mul(m4rotX(rotX),m4rotY(rotY));
    const mvp=m4mul(proj,m4mul(view,model));
    const nm=new Float32Array([model[0],model[1],model[2],model[4],model[5],model[6],model[8],model[9],model[10]]);
    gl.useProgram(prog);
    gl.uniformMatrix4fv(loc.uMVP,false,mvp);
    gl.uniformMatrix4fv(loc.uModel,false,model);
    gl.uniformMatrix3fv(loc.uNormalMat,false,nm);
    gl.uniform3fv(loc.uCamPos,new Float32Array(eye));
    gl.uniform3fv(loc.uLightDirs,lightDirs);
    gl.uniform3fv(loc.uLightCols,lightCols);
    gl.uniform3fv(loc.uAmbient,new Float32Array([0.5,0.5,0.5]));
    bindAttr(loc.aPos,posBuf); bindAttr(loc.aNormal,nrmBuf); bindAttr(loc.aColor,colBuf);
    gl.drawArrays(gl.TRIANGLES,0,vertexCount);
  }
  requestAnimationFrame(frame);
}

async function poll(){
  try{
    const s=await jget('/api/status');
    $('#seed').textContent=s.seed||'—';
    $('#tris').textContent=(s.tris||0).toLocaleString();
    $('#building').classList.toggle('on',!!s.building);
    if(s.seed && cfg.seed!==s.seed){cfg.seed=s.seed;const f=$('#f_seed');if(f)f.value=s.seed;}
    if(typeof s.version==='number' && s.version!==loadedVersion && !s.building){ await loadMesh(); }
  }catch(e){}
  setTimeout(poll,500);
}

(async function init(){
  schema=await jget('/api/schema');
  cfg=await jget('/api/config');
  spin=!!cfg.autoSpin;
  renderPanel();
  requestAnimationFrame(frame);
  poll();
})();
</script>
</body>
</html>
